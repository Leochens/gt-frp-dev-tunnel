<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GT FRP 开发隧道宣传片</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #071014;
      }

      #gt-frp-dev-tunnel-promo {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #071014;
      }

      .transition-wipe {
        position: absolute;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        background:
          radial-gradient(circle at 50% 50%, rgba(77, 227, 255, 0.62), transparent 30%),
          linear-gradient(90deg, transparent 0%, rgba(77, 227, 255, 0.38) 50%, transparent 100%);
        filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-buix" id="gt-frp-dev-tunnel-promo" data-composition-id="gt-frp-dev-tunnel-promo" data-start="0" data-duration="20" data-width="1920" data-height="1080">
      <audio data-hf-id="hf-a3zi" id="narration" src="narration.wav" data-start="0" data-duration="20" data-track-index="0" data-volume="1"></audio>

      <div data-hf-id="hf-muny" id="beat-1" data-composition-id="beat-1-hook" data-composition-src="compositions/beat-1-hook.html" data-start="0" data-duration="4.6" data-track-index="1"></div>
      <div data-hf-id="hf-1xdp" id="beat-2" data-composition-id="beat-2-gateway" data-composition-src="compositions/beat-2-gateway.html" data-start="4.6" data-duration="5.1" data-track-index="1"></div>
      <div data-hf-id="hf-pswz" id="beat-3" data-composition-id="beat-3-agent-handoff" data-composition-src="compositions/beat-3-agent-handoff.html" data-start="9.7" data-duration="5.4" data-track-index="1"></div>
      <div data-hf-id="hf-217f" id="beat-4" data-composition-id="beat-4-verified" data-composition-src="compositions/beat-4-verified.html" data-start="15.1" data-duration="4.9" data-track-index="1"></div>

      <div data-hf-id="hf-p9vq" class="transition-wipe wipe-1"></div>
      <div data-hf-id="hf-lbrp" class="transition-wipe wipe-2"></div>
      <div data-hf-id="hf-ici4" class="transition-wipe wipe-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.fromTo(".wipe-1", { opacity: 0, x: -920 }, { opacity: 0.92, x: 920, duration: 0.52, ease: "power2.inOut" }, 4.36);
      tl.to(".wipe-1", { opacity: 0, duration: 0.16, ease: "power2.out" }, 4.9);
      tl.fromTo(".wipe-2", { opacity: 0, y: 620 }, { opacity: 0.82, y: -620, duration: 0.42, ease: "power2.inOut" }, 9.46);
      tl.to(".wipe-2", { opacity: 0, duration: 0.14, ease: "power2.out" }, 9.88);
      tl.fromTo(".wipe-3", { opacity: 0, scale: 0.76 }, { opacity: 0.9, scale: 1.12, duration: 0.28, ease: "power3.out" }, 14.92);
      tl.to(".wipe-3", { opacity: 0, duration: 0.16, ease: "power2.out" }, 15.2);
      window.__timelines["gt-frp-dev-tunnel-promo"] = tl;
    </script>
