<template id="beat-2-gateway-template">

    <style>
      #beat-2-gateway {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #071014;
        color: #f4fafc;
        font-family: Inter, "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      }
      .bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 62% 48%, rgba(77, 227, 255, 0.17), transparent 30%),
          radial-gradient(circle at 15% 18%, rgba(255, 184, 107, 0.12), transparent 25%),

      .scene {

        width: 100%;
        height: 100%;

        padding: 108px 112px;
        display: grid;
        grid-template-columns: minmax(0, 0.74fr) minmax(0, 1.26fr);

      }
      .eyebrow {

        line-height: 1.02;
        letter-spacing: 0;
        max-width: 680px;

        grid-template-columns: repeat(3, minmax(0, 1fr));

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var proxy = { a: 0, b: 0, c: 0 };
      function updateCounts() {
        document.getElementById("count-a").textContent = Math.round(proxy.a) + "x";
