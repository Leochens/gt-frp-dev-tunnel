name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not include real FRPS tokens, private domains, server IPs, or logs containing secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use redacted sample values when a token, domain, or private server is involved.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Client platform
      placeholder: macOS 15, Ubuntu 24.04, Windows 11, etc.
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: python3 --version
  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted output
      render: text
